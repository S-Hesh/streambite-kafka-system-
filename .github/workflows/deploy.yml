name: Build and Deploy StreamBite

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Java 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install shared-events
        run: cd shared-events && mvn install -DskipTests --no-transfer-progress

      - name: Build order-service
        run: cd order-service && mvn package -DskipTests --no-transfer-progress

      - name: Build inventory-service
        run: cd inventory-service && mvn package -DskipTests --no-transfer-progress

      - name: Build notification-service
        run: cd notification-service && mvn package -DskipTests --no-transfer-progress

      # ── Deploy order-service JAR ──────────────────────────────────
      - name: Deploy order-service JAR
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "order-service/target/order-service-0.0.1-SNAPSHOT.jar"
          target: "/opt/streambite/order/"
          strip_components: 3
          timeout: 120s
          command_timeout: 10m

      # ── Deploy inventory-service JAR ──────────────────────────────
      - name: Deploy inventory-service JAR
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "inventory-service/target/inventory-service-0.0.1-SNAPSHOT.jar"
          target: "/opt/streambite/inventory/"
          strip_components: 3
          timeout: 120s
          command_timeout: 10m

      # ── Deploy notification-service JAR ───────────────────────────
      - name: Deploy notification-service JAR
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "notification-service/target/notification-service-0.0.1-SNAPSHOT.jar"
          target: "/opt/streambite/notification/"
          strip_components: 3
          timeout: 120s
          command_timeout: 10m

      # ── Rename JARs to app.jar and restart services ───────────────
      - name: Rename JARs and restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 60s
          command_timeout: 30s
          script: |
            mv /opt/streambite/order/order-service-0.0.1-SNAPSHOT.jar /opt/streambite/order/app.jar
            mv /opt/streambite/inventory/inventory-service-0.0.1-SNAPSHOT.jar /opt/streambite/inventory/app.jar
            mv /opt/streambite/notification/notification-service-0.0.1-SNAPSHOT.jar /opt/streambite/notification/app.jar
            sudo systemctl daemon-reload
            sudo systemctl restart order-service inventory-service notification-service

      - name: Wait for startup
        run: sleep 45

      # ── Health checks ─────────────────────────────────────────────
      - name: Health check — order-service
        run: |
          curl --fail --silent --max-time 10 \
            http://${{ secrets.EC2_HOST }}:8080/actuator/health | grep -q UP
          echo "order-service is UP"

      - name: Health check — inventory-service
        run: |
          curl --fail --silent --max-time 10 \
            http://${{ secrets.EC2_HOST }}:8081/actuator/health | grep -q UP
          echo "inventory-service is UP"

      - name: Health check — notification-service
        run: |
          curl --fail --silent --max-time 10 \
            http://${{ secrets.EC2_HOST }}:8082/actuator/health | grep -q UP
          echo "notification-service is UP"

      - name: Deployment complete
        run: |
          echo "All 3 services deployed and verified healthy"
          echo "Order Service:        http://${{ secrets.EC2_HOST }}:8080/actuator/health"
          echo "Inventory Service:    http://${{ secrets.EC2_HOST }}:8081/actuator/health"
          echo "Notification Service: http://${{ secrets.EC2_HOST }}:8082/actuator/health"
          echo "Kafka UI:             http://${{ secrets.EC2_HOST }}:8090"
