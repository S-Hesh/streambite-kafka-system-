name: Build and Deploy StreamBite

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Build and deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 30s
          command_timeout: 15m
          script: |
            set -e
            cd /opt/streambite/source
            git pull origin main
            cd shared-events && mvn install -DskipTests --no-transfer-progress -q && cd ..
            cd order-service && mvn package -DskipTests --no-transfer-progress -q
            cp target/order-service-0.0.1-SNAPSHOT.jar /opt/streambite/order/app.jar && cd ..
            cd inventory-service && mvn package -DskipTests --no-transfer-progress -q
            cp target/inventory-service-0.0.1-SNAPSHOT.jar /opt/streambite/inventory/app.jar && cd ..
            cd notification-service && mvn package -DskipTests --no-transfer-progress -q
            cp target/notification-service-0.0.1-SNAPSHOT.jar /opt/streambite/notification/app.jar && cd ..
            sudo systemctl daemon-reload
            sudo systemctl restart order-service inventory-service notification-service
            echo "All services restarted successfully"

      - name: Wait for startup
        run: sleep 90

      - name: Health check — order-service
        run: |
          curl --fail --silent --max-time 10 \
            http://${{ secrets.EC2_HOST }}:8080/actuator/health | grep -q UP
          echo "order-service is UP"

      - name: Health check — inventory-service
        run: |
          curl --fail --silent --max-time 10 \
            http://${{ secrets.EC2_HOST }}:8081/actuator/health | grep -q UP
          echo "inventory-service is UP"

      - name: Health check — notification-service
        run: |
          curl --fail --silent --max-time 10 \
            http://${{ secrets.EC2_HOST }}:8082/actuator/health | grep -q UP
          echo "notification-service is UP"

      - name: Deployment complete
        run: |
          echo "StreamBite fully deployed and healthy"
          echo "Order:        http://${{ secrets.EC2_HOST }}:8080/actuator/health"
          echo "Inventory:    http://${{ secrets.EC2_HOST }}:8081/actuator/health"
          echo "Notification: http://${{ secrets.EC2_HOST }}:8082/actuator/health"
          echo "Kafka UI:     http://${{ secrets.EC2_HOST }}:8090"