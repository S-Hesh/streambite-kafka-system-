name: Build and Deploy StreamBite

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Java 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install shared-events
        run: cd shared-events && mvn install -DskipTests --no-transfer-progress

      - name: Build order-service
        run: cd order-service && mvn package -DskipTests --no-transfer-progress

      - name: Build inventory-service
        run: cd inventory-service && mvn package -DskipTests --no-transfer-progress

      - name: Build notification-service
        run: cd notification-service && mvn package -DskipTests --no-transfer-progress

      - name: Configure SSH — create directory
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

      - name: Configure SSH — write key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          head -1 ~/.ssh/deploy_key

      - name: Configure SSH — scan host
        run: |
          echo "Connecting to host: ${{ secrets.EC2_HOST }}"
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts
          echo "Known hosts entries: $(wc -l < ~/.ssh/known_hosts)"

      - name: Deploy order-service JAR
        run: |
          scp -i ~/.ssh/deploy_key \
            -o ServerAliveInterval=60 \
            -o ConnectTimeout=120 \
            -o StrictHostKeyChecking=no \
            order-service/target/order-service-0.0.1-SNAPSHOT.jar \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/streambite/order/app.jar

      - name: Deploy inventory-service JAR
        run: |
          scp -i ~/.ssh/deploy_key \
            -o ServerAliveInterval=60 \
            -o ConnectTimeout=120 \
            -o StrictHostKeyChecking=no \
            inventory-service/target/inventory-service-0.0.1-SNAPSHOT.jar \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/streambite/inventory/app.jar

      - name: Deploy notification-service JAR
        run: |
          scp -i ~/.ssh/deploy_key \
            -o ServerAliveInterval=60 \
            -o ConnectTimeout=120 \
            -o StrictHostKeyChecking=no \
            notification-service/target/notification-service-0.0.1-SNAPSHOT.jar \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/streambite/notification/app.jar

      - name: Restart services on EC2
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o ServerAliveInterval=60 \
            -o ConnectTimeout=30 \
            -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "sudo systemctl daemon-reload && \
             sudo systemctl restart order-service inventory-service notification-service"

      - name: Wait for startup
        run: sleep 45

      - name: Health check — order-service
        run: |
          curl --fail --silent \
            http://${{ secrets.EC2_HOST }}:8080/actuator/health | grep -q UP
          echo "order-service is UP"

      - name: Health check — inventory-service
        run: |
          curl --fail --silent \
            http://${{ secrets.EC2_HOST }}:8081/actuator/health | grep -q UP
          echo "inventory-service is UP"

      - name: Health check — notification-service
        run: |
          curl --fail --silent \
            http://${{ secrets.EC2_HOST }}:8082/actuator/health | grep -q UP
          echo "notification-service is UP"

      - name: Deployment complete
        run: |
          echo "All 3 services deployed and verified healthy"
          echo "Order Service:        http://${{ secrets.EC2_HOST }}:8080/actuator/health"
          echo "Inventory Service:    http://${{ secrets.EC2_HOST }}:8081/actuator/health"
          echo "Notification Service: http://${{ secrets.EC2_HOST }}:8082/actuator/health"
          echo "Kafka UI:             http://${{ secrets.EC2_HOST }}:8090"
